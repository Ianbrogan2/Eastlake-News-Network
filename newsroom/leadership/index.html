<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Leadership — ENN Newsroom</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="/enn-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/newsroom/assets/hub.css?v=6">
<link rel="stylesheet" href="/newsroom/colors.css?v=6">
<script src="/newsroom/config.js?v=6"></script>
<script src="/EDIT/21-BULLETINS.js?v=6"></script>
<script src="/EDIT/23-SECTIONS.js?v=6"></script>
<script src="/EDIT/22-ROSTER.js?v=6"></script>
<script src="/newsroom/assets/identity.js?v=6"></script>
<script src="/newsroom/assets/grades.js?v=6"></script>
</head>
<body class="nr" data-section="Leadership">
<div data-rail></div>

<main class="nr-wrap">
  <a class="nr-back" href="/newsroom/">← This Week</a>

  <!-- Filled in by script once we know who's looking -->
  <section class="nr-hero nr-reveal">
    <div class="nr-eyebrow"><b>Restricted</b><span id="lead-eyebrow">Leadership</span></div>
    <h1 class="nr-title" id="lead-title">LEADERSHIP</h1>
    <p class="nr-lede" id="lead-lede">Checking your access…</p>
  </section>

  <div id="lead-body"></div>
</main>
<div data-foot></div>

<script src="/newsroom/assets/hub.js?v=6"></script>
<script>
(function(){
  var body = document.getElementById('lead-body');
  var me   = NR.me();

  /* Students who wander in get a friendly redirect, not an error. */
  if(!window.ENN_ID || !window.ENN_ID.isLeader(me)){
    document.getElementById('lead-title').textContent = 'CREW ONLY';
    document.getElementById('lead-lede').textContent =
      'This page is for leadership roles. Sign in with a leadership student ID to see it.';
    body.innerHTML = NR.emptyState('🔒','Nothing to show here',
      'If you hold a leadership role this semester and this page is empty, your student ID may not be in that role slot yet — ask Mr. Nimmo to add it.') +
      '<div style="margin-top:18px"><a class="nr-btn ghost" href="/newsroom/">← Back to This Week</a></div>';
    NR.observe(document);
    return;
  }

  var name    = window.ENN_ID.displayName(me);
  var roles   = window.ENN_ID.roleLine(me);
  var advisor = window.ENN_ID.isAdvisor(me);

  document.getElementById('lead-eyebrow').textContent = roles || 'Leadership';
  document.getElementById('lead-title').textContent   = advisor ? 'ADVISOR DESK' : 'LEADERSHIP';
  document.getElementById('lead-lede').textContent    = advisor
    ? 'Every period, every group, every air date — the whole network from one page.'
    : 'Your role, your period, and the groups you’re responsible for.';

  var R = (typeof ENN_ROSTER !== 'undefined') ? ENN_ROSTER : null;
  var periods = advisor ? window.ENN_ID.periods : [me.period];
  var html = '';

  /* ── Who you are ── */
  html += '<div class="nr-panel nr-reveal" style="margin-bottom:26px">' +
    '<div class="nr-eyebrow" style="margin-bottom:12px"><b>You</b><span>' + NR.esc(name) + '</span></div>' +
    '<p style="color:#c9cfda;font-size:14.5px;line-height:1.6">' +
      '<strong>' + NR.esc(name) + '</strong>' +
      (roles ? ' &middot; ' + NR.esc(roles) : '') +
      (advisor ? ' &middot; all periods' : (me.period ? ' &middot; Period ' + me.period : '')) +
    '</p></div>';

  /* ── Each period you're responsible for ── */
  periods.forEach(function(p){
    var per = R ? R['period'+p] : null;
    if(!per) return;

    html += '<h2 class="nr-h2 nr-reveal">Period ' + p + '</h2>';

    var pGroups = (per.groups||[]).map(function(g,i){
      return { n:i+1, name:g.name || ('Group '+(i+1)),
               members:(g.members||[]).filter(function(m){ return m && (m.first||m.last||m.id); }) };
    });
    var groupCount = pGroups.length;

    /* ── Who airs, and when ────────────────────────────────────
       Groups alternate in two waves, so each upcoming bulletin has a
       specific group on it. Show the next several dates with the group
       that airs and everyone in it, so a leader can see the runway at a
       glance and know exactly who to chase for each show. */
    if(typeof ENN_SEASON !== 'undefined'){
      var upNext = ENN_SEASON.upcomingFor('P'+p).slice(0, 8);
      if(upNext.length){
        html += '<div class="nr-panel nr-reveal" style="margin-bottom:18px">' +
          '<h3 class="nr-h3">Air Schedule — Who\'s Up Next</h3>' +
          '<div class="lead-sched">';
        html += upNext.map(function(b, idx){
          /* every group whose own alternating dates include this bulletin
             (waves split by the filled groups, so 8 groups is 4/4) */
          var airing = pGroups.filter(function(g){
            if(!g.members.length) return false;
            var gn = window.ENN_ID.groupDates(p, g.n);
            return gn.some(function(x){ return x.iso === b.iso; });
          });
          var when = ENN_SEASON.longDate(b.date);
          var soon = (idx === 0) ? ' is-next' : '';
          if(!airing.length){
            return '<div class="lead-sched-row' + soon + '">' +
              '<div class="lead-sched-when">' + NR.esc(when) +
                (idx===0 ? ' <span class="lead-next-tag">next</span>' : '') + '</div>' +
              '<div class="lead-sched-groups"><span class="lead-sched-empty">No group assigned yet</span></div>' +
            '</div>';
          }
          return '<div class="lead-sched-row' + soon + '">' +
            '<div class="lead-sched-when">' + NR.esc(when) +
              (idx===0 ? ' <span class="lead-next-tag">next</span>' : '') + '</div>' +
            '<div class="lead-sched-groups">' +
              airing.map(function(g){
                return '<div class="lead-sched-group">' +
                  '<b>' + NR.esc(g.name) + '</b>' +
                  '<span>' + g.members.map(function(m){
                    return NR.esc(window.ENN_ID.fullName(m)); }).filter(Boolean).join(', ') + '</span>' +
                '</div>';
              }).join('') +
            '</div>' +
          '</div>';
        }).join('');
        html += '</div></div>';
      }
    }

    /* leadership table */
    var leaders = (per.leadership||[]).filter(function(l){ return l && (l.first || l.last || l.id); });

    /* Plenty of leaders also produce with a group. Look each one up by
       ID so the table can show that second hat, and flag anyone who
       holds more than one leadership role. */
    function alsoIn(id){
      if(!id) return '';
      var hits = [];
      (per.groups||[]).forEach(function(g, gi){
        (g.members||[]).forEach(function(m){
          if(m && String(m.id).trim() === String(id).trim()) hits.push(g.name || ('Group '+(gi+1)));
        });
      });
      return hits.join(', ');
    }
    function otherRoles(id, thisRole){
      if(!id) return [];
      return leaders.filter(function(x){
        return String(x.id).trim() === String(id).trim() && x.role !== thisRole;
      }).map(function(x){ return x.role; });
    }

    html += '<div class="nr-panel nr-reveal" style="margin-bottom:18px">' +
      '<h3 class="nr-h3">Leadership</h3>';
    if(leaders.length){
      html += '<div class="nr-board-wrap"><table class="nr-board"><thead><tr>' +
        '<th>Role</th><th>Who</th><th>Also</th></tr></thead><tbody>' +
        leaders.map(function(l){
          var group = alsoIn(l.id);
          var others = otherRoles(l.id, l.role);
          var also = [];
          if(group)         also.push('produces with <strong>' + NR.esc(group) + '</strong>');
          if(others.length) also.push('also ' + NR.esc(others.join(' &amp; ')));
          return '<tr><td><strong>' + NR.esc(l.role||'—') + '</strong></td><td>' +
                 NR.esc(window.ENN_ID.fullName(l) || '—') + '</td><td style="color:var(--steel);font-size:13px">' +
                 (also.length ? also.join(' · ') : '—') + '</td></tr>';
        }).join('') + '</tbody></table></div>';
    } else {
      html += '<p style="color:var(--steel);font-size:13.5px">No leadership roles filled for this period yet.</p>';
    }
    html += '</div>';

    /* groups */
    var groups = (per.groups||[]).map(function(g,i){
      var mem = (g.members||[]).filter(function(m){ return m && (m.first || m.last || m.id); });
      return {n:i+1, name:g.name, members:mem};
    }).filter(function(g){ return g.members.length; });

    html += '<div class="nr-panel nr-reveal" style="margin-bottom:30px">' +
      '<h3 class="nr-h3">Production Groups</h3>';
    if(groups.length){
      html += '<div class="nr-board-wrap"><table class="nr-board"><thead><tr><th>#</th><th>Group</th><th>Members</th></tr></thead><tbody>' +
        groups.map(function(g){
          return '<tr><td>' + g.n + '</td><td><strong>' + NR.esc(g.name||('Group '+g.n)) + '</strong></td><td>' +
            g.members.map(function(m){ return NR.esc(window.ENN_ID.fullName(m)); }).filter(Boolean).join(', ') +
            '</td></tr>';
        }).join('') + '</tbody></table></div>';
    } else {
      html += NR.emptyState('👥','No groups filled in yet',
        'Once the roster is entered at /admin, every group in this period shows up here with its members.');
    }
    html += '</div>';
  });

  /* ── Your tools ──────────────────────────────────────────────
     Grading is only for the grading roles; the rest are for any leader.
     Each can also be switched off in /admin. Columns:
       [switch, needsGrader, url, kicker, title, blurb]              */
  var canGrade = window.ENN_ID.canGrade(me);
  var TOOLS = [
    ['toolGrading',   true,  '/newsroom/leadership/grade.html',     'Grading',     'Grade a Piece',
     'Your lane of the 40·40·20 rubric, shared live with the other graders.'],
    ['toolGradebook', false, '/newsroom/leadership/gradebook.html', 'Records',     'Gradebook',
     'Every graded piece, with scores and feedback. Export to a spreadsheet.'],
    [null,            false, '/newsroom/leaderboard/',              'Every 2 weeks','Leaderboard',
     'The running record, and the biweekly vote for the best piece.'],
    ['toolRundown',   false, '/newsroom/leadership/rundown.html',   'The show',    'Rundown Builder',
     'Build the segment order, assign groups, land it on ten minutes, print it.'],
    [null,            false, '/newsroom/catalog/',                  'Submissions', 'Catalog',
     'What\'s been turned in, by group and air date.']
  ].filter(function(x){
    if(x[0] && !NR.sectionOn(x[0])) return false;   // switched off in admin
    if(x[1] && !canGrade) return false;             // grading role required
    return true;
  }).map(function(x){ return [x[0], x[2], x[3], x[4], x[5]]; });

  if(TOOLS.length){
    html += '<h2 class="nr-h2 nr-reveal">Your Tools</h2>';
    html += '<div class="nr-grid nr-stagger">' + TOOLS.map(function(x){
      return '<a class="nr-tile" href="' + x[1] + '"><div class="k">' + NR.esc(x[2]) + '</div>' +
             '<h3>' + NR.esc(x[3]) + '</h3><p>' + NR.esc(x[4]) + '</p><span class="go">→</span></a>';
    }).join('') + '</div>';
  }

  body.innerHTML = html;
  NR.observe(body);
})();
</script>
</body>
</html>
