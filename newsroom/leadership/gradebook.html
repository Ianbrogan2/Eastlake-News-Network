<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gradebook — ENN Newsroom</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="/enn-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/newsroom/assets/hub.css?v=6">
<link rel="stylesheet" href="/newsroom/colors.css?v=6">
<script src="/newsroom/config.js?v=6"></script>
<script src="/EDIT/21-BULLETINS.js?v=6"></script>
<script src="/EDIT/23-SECTIONS.js?v=6"></script>
<script src="/EDIT/22-ROSTER.js?v=6"></script>
<script src="/newsroom/assets/identity.js?v=6"></script>
<script src="/newsroom/assets/grades.js?v=6"></script>
</head>
<body class="nr" data-section="Leadership">
<div data-rail></div>

<main class="nr-wrap">
  <a class="nr-back" href="/newsroom/leadership/">← Leadership</a>
  <section class="nr-hero nr-reveal">
    <div class="nr-eyebrow"><b>Restricted</b><span id="gb-live">Records</span></div>
    <h1 class="nr-title">GRADEBOOK</h1>
    <p class="nr-lede">Every graded piece, with the lane breakdown and feedback. Export it whenever you need to hand grades in.</p>
  </section>
  <div id="gb-body"></div>
</main>
<div data-foot></div>

<script src="/newsroom/assets/hub.js?v=6"></script>
<script>
(function(){
  var body = document.getElementById('gb-body');
  var me = NR.me();

  if(typeof NR.sectionOn === 'function' && !NR.sectionOn('toolGradebook')){ NR.showDisabled(); return; }
  if(!window.ENN_ID || !window.ENN_ID.isLeader(me)){
    body.innerHTML = NR.emptyState('🔒','Leadership only',
      'Sign in with a leadership student ID to see the gradebook.') +
      '<div style="margin-top:18px"><a class="nr-btn ghost" href="/newsroom/">← Back to This Week</a></div>';
    NR.observe(document); return;
  }

  var G = window.ENN_GRADES;
  document.getElementById('gb-live').textContent = G.live() ? 'Records · live' : 'Records · this computer';

  function draw(){
    var recs = G.all().filter(function(r){
      var t = G.total(r); return t.graded > 0 || r.locked;   // anything actually touched
    }).sort(function(a,b){ return String(b.airDate).localeCompare(String(a.airDate)); });

    if(!recs.length){
      body.innerHTML = NR.emptyState('📒','No grades yet',
        (G.live() ? 'Grades appear here as leaders enter them on the Grading page.'
                  : 'Grades entered on this computer show up here. Link a shared grade store in /admin so every leader’s grades collect in one place.')) +
        '<div style="margin-top:18px"><a class="nr-btn" href="/newsroom/leadership/grade.html">Grade a piece →</a></div>';
      NR.observe(body); return;
    }

    var totals = recs.map(function(r){ return G.total(r).total; });
    var avg = totals.reduce(function(a,b){ return a+b; }, 0) / totals.length;
    var lows = totals.filter(function(n){ return n < 70; }).length;
    var open = recs.filter(function(r){ return G.total(r).graded < 3 && !r.locked; }).length;

    var html = '';
    html += '<div class="nr-grid nr-stagger" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:22px">' +
      stat('Graded pieces', recs.length) +
      stat('Class average', Math.round(avg*10)/10, '#7DD8FF') +
      stat('Below 70', lows, lows?'#ff8a84':null) +
      stat('Waiting on a lane', open, open?'#ffcf6b':null) +
      '</div>';

    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">' +
      '<button class="nr-btn" id="gb-csv" type="button">↓ Download CSV</button>' +
      (NR.cfg('GRADEBOOK_SHEET_URL') ? '<a class="nr-btn ghost" href="'+NR.esc(NR.cfg('GRADEBOOK_SHEET_URL'))+'" target="_blank" rel="noopener">Open shared gradebook ↗</a>' : '') +
      '<a class="nr-btn ghost" href="/newsroom/leaderboard/">Leaderboard →</a>' +
      '</div>';

    html += '<div class="nr-panel nr-reveal"><div class="nr-board-wrap"><table class="nr-board"><thead><tr>' +
      '<th>Air date</th><th>Period</th><th>Group</th><th>Piece</th><th>Prod</th><th>Dir</th><th>Ed</th><th>Total</th><th>Status</th></tr></thead><tbody>' +
      recs.map(function(r){
        var t = G.total(r);
        var col = t.total>=90 ? '#4ade80' : (t.total<70 ? '#ff8a84' : '#7DD8FF');
        var lane = function(k){ var l=r.lanes&&r.lanes[k]; return l&&typeof l.score==='number'?l.score:'—'; };
        var status = r.locked ? '<span style="color:#4ade80">✓ final</span>'
                   : (t.graded<3 ? '<span style="color:var(--steel)">'+t.graded+'/3 lanes</span>' : 'open');
        return '<tr><td>'+NR.esc(r.airDate||'—')+'</td><td>'+NR.esc(r.period||'—')+'</td>' +
          '<td><strong>'+NR.esc(r.groupName||'—')+'</strong></td>' +
          '<td>'+NR.esc(r.title||r.type||'—')+'</td>' +
          '<td>'+lane('producer')+'</td><td>'+lane('director')+'</td><td>'+lane('editor')+'</td>' +
          '<td style="color:'+col+'"><strong>'+t.total+'</strong> '+t.letter+'</td>' +
          '<td>'+status+'</td></tr>' +
          (r.feedback && r.feedback.text
            ? '<tr><td></td><td colspan="8" style="color:#c9cfda;font-size:12.5px;padding-top:0">💬 '+NR.esc(r.feedback.text)+'</td></tr>'
            : '');
      }).join('') + '</tbody></table></div>' +
      '<p style="font-family:var(--mono);font-size:10.5px;color:var(--steel);margin-top:12px">' +
      (G.live() ? 'Live — updates as leaders grade.' : 'Stored in this browser. Export a CSV to move it.') + '</p></div>';

    body.innerHTML = html;

    document.getElementById('gb-csv').onclick = function(){
      var head = ['Air date','Period','Group','Members','Type','Title','Producer','Director','Editor','Deductions','Total','Letter','Feedback','Status'];
      var rows = recs.map(function(r){
        var t = G.total(r);
        var lane=function(k){ var l=r.lanes&&r.lanes[k]; return l&&typeof l.score==='number'?l.score:''; };
        return [r.airDate,r.period,r.groupName,r.members,r.type,r.title,
                lane('producer'),lane('director'),lane('editor'),
                (r.deductions||[]).join('; '),t.total,t.letter,
                r.feedback?r.feedback.text:'', r.locked?'final':(t.graded+'/3')]
          .map(function(v){ return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'; }).join(',');
      });
      var csv = [head.join(',')].concat(rows).join('\n');
      var a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
      a.download = 'enn-gradebook.csv'; a.click();
    };
    NR.observe(body);
  }

  function stat(label, val, col){
    return '<div class="nr-panel"><div style="font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--steel)">'+label+'</div>' +
      '<div style="font-family:var(--display);font-size:44px;margin-top:6px'+(col?';color:'+col:'')+'">'+val+'</div></div>';
  }

  G.onChange(draw);
  G.ready().then(function(){ draw(); G.startSync(5000); });
})();
</script>
</body>
</html>
