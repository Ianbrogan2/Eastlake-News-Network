<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Grading — ENN Newsroom</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="/enn-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/newsroom/assets/hub.css?v=6">
<link rel="stylesheet" href="/newsroom/colors.css?v=6">
<script src="/newsroom/config.js?v=6"></script>
<script src="/EDIT/21-BULLETINS.js?v=6"></script>
<script src="/EDIT/23-SECTIONS.js?v=6"></script>
<script src="/EDIT/22-ROSTER.js?v=6"></script>
<script src="/newsroom/assets/identity.js?v=6"></script>
<script src="/newsroom/assets/grades.js?v=6"></script>
<style>
.gr-pick{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.gr-pick label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--steel);margin-bottom:6px}
.gr-pick select,.gr-pick input{width:100%;padding:10px 12px;font-size:14px;border-radius:9px;font-family:var(--body);background:var(--panel-2);border:1px solid var(--edge);color:var(--ink)}
.gr-pick select:focus,.gr-pick input:focus{outline:none;border-color:var(--enn);box-shadow:0 0 0 2px rgba(26,86,219,.18)}

.gr-live{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);border:1px solid var(--edge);border-radius:999px;padding:6px 12px;background:var(--panel-2)}
.gr-live i{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 10px 1px rgba(74,222,128,.7)}
.gr-live.local i{background:var(--steel);box-shadow:none}

.gr-lanes{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin:16px 0}
.gr-lane{border:1px solid var(--edge);border-radius:14px;padding:16px 17px;background:linear-gradient(180deg,var(--panel),var(--panel-2))}
.gr-lane.mine{border-color:rgba(125,216,255,.5);box-shadow:0 0 0 3px rgba(125,216,255,.1)}
.gr-lane-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px}
.gr-lane-name{font-family:var(--display);font-size:22px;letter-spacing:.02em;color:var(--ink)}
.gr-lane-owner{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel)}
.gr-lane-input{display:flex;align-items:center;gap:8px}
.gr-lane-input input{width:78px;padding:10px;text-align:center;font-family:var(--mono);font-size:20px;border-radius:9px;background:var(--panel-2);border:1px solid var(--edge);color:var(--ink)}
.gr-lane-input input:focus{outline:none;border-color:var(--enn)}
.gr-lane-input .max{font-family:var(--mono);font-size:13px;color:var(--steel)}
.gr-lane-meta{margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--steel);min-height:14px}
.gr-lane-meta.fresh{color:#7DD8FF}
.gr-lane-help{margin-top:12px;border-top:1px solid rgba(255,255,255,.05);padding-top:10px}
.gr-lane-help summary{cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--steel)}
.gr-lane-help ul{list-style:none;margin:8px 0 0;padding:0}
.gr-lane-help li{font-size:12px;color:#c9cfda;padding:3px 0}
.gr-lane-help .maxp{font-family:var(--mono);font-size:10px;color:var(--steel);margin-left:4px}

.gr-ded{display:flex;flex-wrap:wrap;gap:8px}
.gr-ded label{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:12.5px;color:#c9cfda;border:1px solid var(--edge);border-radius:999px;padding:7px 12px;background:var(--panel-2)}
.gr-ded label:has(input:checked){border-color:rgba(255,59,48,.55);background:rgba(255,59,48,.09);color:#ff8a84}

.gr-total{position:sticky;bottom:0;z-index:5;margin-top:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border:1px solid var(--edge);border-radius:14px;padding:16px 20px;background:linear-gradient(180deg,var(--panel),var(--panel-2));box-shadow:0 -10px 30px -18px rgba(0,0,0,.9)}
.gr-total-num{font-family:var(--display);font-size:52px;line-height:1}
.gr-total-num small{font-family:var(--mono);font-size:13px;color:var(--steel);margin-left:6px}
.gr-grade{font-family:var(--display);font-size:26px;color:var(--steel);margin-left:10px}
.gr-total-break{font-family:var(--mono);font-size:11px;color:var(--steel);margin-top:6px}
.gr-locked-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#4ade80}
@media (max-width:620px){ .gr-total{position:static} .gr-total-num{font-size:40px} }
</style>
</head>
<body class="nr" data-section="Leadership">
<div data-rail></div>

<main class="nr-wrap">
  <a class="nr-back" href="/newsroom/leadership/">← Leadership</a>
  <section class="nr-hero nr-reveal">
    <div class="nr-eyebrow"><b>Restricted</b><span id="gr-who">Grading</span></div>
    <h1 class="nr-title">GRADE A<br>PIECE</h1>
    <p class="nr-lede">Each leader owns a lane — you can adjust any of them, and the advisor has the final say. Everyone grading this piece sees the same numbers.</p>
  </section>
  <div id="gr-body"></div>
</main>
<div data-foot></div>

<script src="/newsroom/assets/hub.js?v=6"></script>
<script>
(function(){
  var body = document.getElementById('gr-body');
  var me = NR.me();

  if(typeof NR.sectionOn === 'function' && !NR.sectionOn('toolGrading')){ NR.showDisabled(); return; }

  if(!window.ENN_ID || !window.ENN_ID.canGrade(me)){
    document.getElementById('gr-who').textContent = 'No access';
    body.innerHTML = NR.emptyState('🔒','Grading is for the grading roles',
      'Only the Studio Director, Newsroom Director, Main Editor and Mr. Nimmo can grade. Sign in with one of those IDs.') +
      '<div style="margin-top:18px"><a class="nr-btn ghost" href="/newsroom/">← Back to This Week</a></div>';
    NR.observe(document); return;
  }

  var G = window.ENN_GRADES;
  var meName = window.ENN_ID.displayName(me);
  var advisor = window.ENN_ID.isAdvisor(me);
  var myLane = window.ENN_ID.homeLane(me);
  document.getElementById('gr-who').textContent = window.ENN_ID.roleLine(me) || 'Leadership';

  var R = (typeof ENN_ROSTER !== 'undefined') ? ENN_ROSTER : null;
  var periods = advisor ? window.ENN_ID.periods : [me.period];
  var curKey = null;

  var html = '';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">' +
    '<h2 class="nr-h2 nr-reveal" style="margin:0">What are you grading?</h2>' +
    '<span class="gr-live ' + (G.live() ? '' : 'local') + '"><i></i>' +
      (G.live() ? 'Live · everyone sees this' : 'This computer only') + '</span></div>';
  html += '<div class="nr-panel nr-reveal" style="margin-bottom:20px"><div class="gr-pick">';
  html += '<div><label>Period</label><select id="f-period">' +
    periods.map(function(p){ return '<option value="'+p+'">Period '+p+'</option>'; }).join('') + '</select></div>';
  html += '<div><label>Group</label><select id="f-group"></select></div>';
  html += '<div><label>Air date</label><select id="f-date"></select></div>';
  html += '<div><label>Piece type</label><select id="f-type">' +
    ['Top Story','Feature','Sports Corner','Club / Interview','PSA / Mini-game','Trivia / Comedy','Other']
      .map(function(t){ return '<option>'+t+'</option>'; }).join('') + '</select></div>';
  html += '</div><div class="gr-pick" style="margin-top:12px"><div style="grid-column:1/-1">' +
    '<label>Piece title</label><input id="f-title" type="text" placeholder="What was the piece called?"></div></div>' +
    '<div id="gr-members" style="margin-top:12px"></div></div>';
  html += '<div id="gr-sheet"></div>';
  body.innerHTML = html;

  var $ = function(s){ return document.querySelector(s); };
  var periodSel = $('#f-period'), groupSel = $('#f-group'), dateSel = $('#f-date'),
      typeSel = $('#f-type'), titleInp = $('#f-title');

  function groupsFor(p){ var per = R ? R['period'+p] : null; return per ? (per.groups||[]) : []; }
  function membersOf(p, gi){
    var gs = groupsFor(p); var g = (gi!=='' && gs[gi]) ? gs[gi] : null;
    return g ? (g.members||[]).filter(function(m){ return m && (m.first||m.last||m.id); }) : [];
  }
  function fillGroups(){
    var gs = groupsFor(periodSel.value);
    groupSel.innerHTML = gs.length
      ? gs.map(function(g,i){ return '<option value="'+i+'">'+NR.esc(g.name||('Group '+(i+1)))+'</option>'; }).join('')
      : '<option value="">— roster empty —</option>';
  }
  function fillDates(){
    dateSel.innerHTML = '';
    if(typeof ENN_SEASON === 'undefined'){ dateSel.innerHTML='<option>—</option>'; return; }
    var p = periodSel.value;
    var all = ENN_SEASON.all().filter(function(b){ return b.period==='P'+p; });
    var now = Date.now();
    var past = all.filter(function(b){ return b.date.getTime()<=now; }).reverse();
    var future = all.filter(function(b){ return b.date.getTime()>now; });
    dateSel.innerHTML =
      past.map(function(b){ return '<option value="'+b.iso+'">'+ENN_SEASON.shortDate(b.date)+' (aired)</option>'; }).join('') +
      future.map(function(b){ return '<option value="'+b.iso+'">'+ENN_SEASON.shortDate(b.date)+'</option>'; }).join('');
    if(!dateSel.innerHTML) dateSel.innerHTML = '<option value="">—</option>';
  }
  function fillMembers(){
    var mem = membersOf(periodSel.value, groupSel.value);
    var host = $('#gr-members');
    host.innerHTML = mem.length
      ? '<div style="font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--steel);margin-bottom:6px">Grade shared by</div>' +
        '<div class="nr-desk-mates" style="margin:0;padding:0;border:0">' +
          mem.map(function(m){ return '<b>'+NR.esc(window.ENN_ID.fullName(m))+'</b>'; }).join('') + '</div>'
      : '<div style="font-family:var(--mono);font-size:11px;color:var(--steel)">No students in this group yet.</div>';
  }

  function selectPiece(){
    var p = periodSel.value, gi = groupSel.value, iso = dateSel.value;
    if(gi === '' || !iso){ curKey = null; renderSheet(); return; }
    var gs = groupsFor(p), g = gs[gi];
    curKey = G.keyFor(p, +gi+1, iso);
    var mem = membersOf(p, gi);
    G.setMeta({
      key: curKey, period: p, group: +gi+1,
      groupName: g.name || ('Group '+(+gi+1)),
      members: mem.map(function(m){ return window.ENN_ID.fullName(m); }).join(', '),
      airDate: iso, type: typeSel.value, title: titleInp.value, by: meName
    });
    renderSheet();
  }

  periodSel.addEventListener('change', function(){ fillGroups(); fillDates(); fillMembers(); selectPiece(); });
  groupSel.addEventListener('change', function(){ fillMembers(); selectPiece(); });
  dateSel.addEventListener('change', selectPiece);
  typeSel.addEventListener('change', function(){ if(curKey) G.setMeta({key:curKey, type:typeSel.value, by:meName}); });
  titleInp.addEventListener('input', function(){ if(curKey) G.setMeta({key:curKey, title:titleInp.value, by:meName}); });

  fillGroups(); fillDates(); fillMembers();

  function ago(iso){
    if(!iso) return '';
    var s = Math.max(0, (Date.now() - new Date(iso).getTime())/1000);
    if(s < 12) return 'just now';
    if(s < 90) return Math.round(s) + 's ago';
    if(s < 5400) return Math.round(s/60) + 'm ago';
    return Math.round(s/3600) + 'h ago';
  }

  function renderSheet(){
    var host = $('#gr-sheet');
    if(!curKey){ host.innerHTML = '<p class="nr-sub">Pick a group and air date to start grading.</p>'; return; }
    var rec = G.get(curKey);

    var laneHTML = G.LANES.map(function(L){
      var lane = rec && rec.lanes ? rec.lanes[L.key] : null;
      var mine = (L.key === myLane);
      var val = lane && typeof lane.score === 'number' ? lane.score : '';
      var meta = lane ? ('Set by ' + NR.esc(lane.by||'?') + ' · ' + ago(lane.at)) : 'Not graded yet';
      return '<div class="gr-lane' + (mine ? ' mine' : '') + '">' +
        '<div class="gr-lane-head"><div class="gr-lane-name">' + L.label + '</div>' +
          '<div class="gr-lane-owner">' + (mine ? 'your lane' : NR.esc(L.home)) + '</div></div>' +
        '<div class="gr-lane-input"><input type="number" min="0" max="' + L.max + '" step="0.5" ' +
          'value="' + val + '" placeholder="0" data-lane="' + L.key + '"><span class="max">/ ' + L.max + '</span></div>' +
        '<div class="gr-lane-meta" data-lanemeta="' + L.key + '">' + meta + '</div>' +
        '<details class="gr-lane-help"><summary>What this covers</summary><ul>' +
          L.items.map(function(it){ return '<li>' + NR.esc(it[1]) + '<span class="maxp">'+it[2]+'</span></li>'; }).join('') +
        '</ul></details></div>';
    }).join('');

    var deds = (rec && rec.deductions) || [];
    var dedHTML = G.DEDUCTIONS.map(function(d){
      return '<label><input type="checkbox" data-ded value="'+d[0]+'"'+(deds.indexOf(d[0])>=0?' checked':'')+'>'+
             '<span>'+NR.esc(d[1])+' <b style="font-family:var(--mono);font-size:10px;opacity:.7">'+d[2]+'</b></span></label>';
    }).join('');

    var fb = (rec && rec.feedback) ? rec.feedback.text : '';
    var fbMeta = (rec && rec.feedback && rec.feedback.by) ? ('Last edited by ' + NR.esc(rec.feedback.by) + ' · ' + ago(rec.feedback.at)) : '';
    var locked = rec && rec.locked;

    host.innerHTML =
      '<h2 class="nr-h2 nr-reveal">The Three Lanes</h2>' +
      '<p class="nr-sub nr-reveal">' + (G.live()
        ? 'Type a score in any lane. Everyone grading this piece sees your change within a few seconds.'
        : 'Type a score in any lane. Link a grade store in /admin to share this with the other leaders live.') + '</p>' +
      '<div class="gr-lanes">' + laneHTML + '</div>' +
      '<h2 class="nr-h2 nr-reveal">Automatic Deductions</h2>' +
      '<div class="nr-panel nr-reveal" style="margin-bottom:20px"><div class="gr-ded">' + dedHTML + '</div></div>' +
      '<h2 class="nr-h2 nr-reveal">Feedback for the Group</h2>' +
      '<p class="nr-sub nr-reveal">Every student in this group sees this on their own screen.</p>' +
      '<div class="nr-panel nr-reveal" style="margin-bottom:20px">' +
        '<textarea id="gr-fb" rows="4" placeholder="What worked, and the one thing to fix next time." ' +
          'style="width:100%;padding:12px;border-radius:10px;background:var(--panel-2);border:1px solid var(--edge);color:var(--ink);font-family:var(--body);font-size:14px;resize:vertical">' + NR.esc(fb) + '</textarea>' +
        '<div style="font-family:var(--mono);font-size:10px;color:var(--steel);margin-top:8px" id="gr-fb-meta">' + fbMeta + '</div>' +
      '</div>' +
      '<div class="gr-total nr-reveal">' +
        '<div><div class="gr-total-num"><span id="gr-num">0</span><small>/ 100</small><span class="gr-grade" id="gr-letter">—</span></div>' +
          '<div class="gr-total-break" id="gr-break"></div></div>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">' +
          '<span id="gr-lockmsg" class="gr-locked-tag">' + (locked ? '✓ Accepted as final' : '') + '</span>' +
          (advisor
            ? '<button class="nr-btn ' + (locked?'ghost':'') + '" id="gr-lock" type="button">' + (locked ? 'Unlock' : '◉ Accept as final') + '</button>'
            : '') +
        '</div>' +
      '</div>';

    wireSheet();
    recompute();
  }

  function wireSheet(){
    document.querySelectorAll('[data-lane]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var L = G.LANES.filter(function(x){ return x.key===inp.dataset.lane; })[0];
        if(inp.value === '') G.clearLane(curKey, inp.dataset.lane, meName);
        else G.setLane(curKey, inp.dataset.lane, Math.max(0, Math.min(L.max, +inp.value||0)), meName);
        recompute();
      });
    });
    document.querySelectorAll('[data-ded]').forEach(function(cb){
      cb.addEventListener('change', function(){
        var arr = [];
        document.querySelectorAll('[data-ded]:checked').forEach(function(x){ arr.push(x.value); });
        G.setDeductions(curKey, arr, meName); recompute();
      });
    });
    var fb = $('#gr-fb');
    if(fb){
      var t=null;
      fb.addEventListener('input', function(){
        clearTimeout(t); t = setTimeout(function(){ G.setFeedback(curKey, fb.value, meName); }, 500);
      });
    }
    var lock = $('#gr-lock');
    if(lock) lock.addEventListener('click', function(){
      var rec = G.get(curKey);
      G.setLocked(curKey, !(rec && rec.locked), meName).then(renderSheet);
    });
  }

  function recompute(){
    var rec = G.get(curKey);
    var t = G.total(rec);
    var numEl=$('#gr-num'), letEl=$('#gr-letter'), brEl=$('#gr-break');
    if(numEl) numEl.textContent = t.total;
    if(letEl) letEl.textContent = t.letter;
    if(brEl) brEl.textContent = 'Producer + Director + Editor = ' + t.subtotal +
      (t.deducted ? '  −' + t.deducted + ' deductions' : '') +
      (t.late ? '  · LATE → automatic 0' : '') +
      '  ·  ' + t.graded + '/3 lanes in';
  }

  G.onChange(function(){
    if(!curKey) return;
    var rec = G.get(curKey);
    if(!rec) return;
    document.querySelectorAll('[data-lane]').forEach(function(inp){
      if(document.activeElement === inp) return;
      var lane = rec.lanes ? rec.lanes[inp.dataset.lane] : null;
      var v = lane && typeof lane.score==='number' ? String(lane.score) : '';
      if(inp.value !== v) inp.value = v;
      var m = document.querySelector('[data-lanemeta="'+inp.dataset.lane+'"]');
      if(m){ m.textContent = lane ? ('Set by '+ (lane.by||'?') +' · '+ ago(lane.at)) : 'Not graded yet';
             m.classList.toggle('fresh', !!lane); }
    });
    var fb = document.getElementById('gr-fb');
    if(fb && document.activeElement !== fb && rec.feedback && fb.value !== rec.feedback.text) fb.value = rec.feedback.text;
    recompute();
  });

  G.ready().then(function(){ selectPiece(); G.startSync(4000); });
})();
</script>
</body>
</html>
